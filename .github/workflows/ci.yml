name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Volledige geschiedenis nodig zodat check-allowlist-shrinks.ts
          # origin/main kan vergelijken met de PR-branch (lib/authz/legacy-routes.ts
          # mag alleen krimpen — zie docs/architecture/migration-plan.md).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Secure-endpoint-architectuur (importgrenzen, service-role-isolatie, route-manifest, allowlist)
        run: npm run verify:architecture

      - run: npm test

      - run: npm run lint

      - run: npm run build

      - run: npm run i18n:check
