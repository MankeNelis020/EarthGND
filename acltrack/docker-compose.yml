services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/data/acltrack.db
      - ALLOWED_ORIGIN=${FRONTEND_URL:-http://localhost}
      - JWT_EXPIRES=${JWT_EXPIRES:-8h}
      - PORT=3001
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
